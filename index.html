<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT 2026 Prep — Topic Sprints</title>
<style>
  :root{
    --bg:#f7f8fb; --card:#ffffff; --ink:#1c2333; --sub:#5b6478;
    --line:#e4e7ef; --accent:#2f6fed; --accent-soft:#eaf1ff;
    --good:#1a9e6b; --good-soft:#e6f7ef;
    --warn:#c98a1a; --warn-soft:#fdf3e2;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
  }
  .wrap{max-width:860px; margin:0 auto; padding:36px 18px 60px;}
  header{margin-bottom:26px;}
  header h1{font-size:24px; margin:0 0 6px;}
  header p{color:var(--sub); font-size:14.5px; margin:0;}

  .section-title{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--sub); margin:28px 0 12px;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px;
    display:flex; flex-direction:column; gap:8px; text-decoration:none; color:inherit;
    transition:border-color .15s ease, transform .05s ease;
  }
  .card.live:hover{border-color:var(--accent); transform:translateY(-1px);}
  .card.disabled{opacity:.55; cursor:not-allowed;}
  .card .topic{font-size:15.5px; font-weight:600;}
  .card .desc{font-size:12.5px; color:var(--sub);}
  .badge{align-self:flex-start; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;}
  .badge.live{background:var(--good-soft); color:var(--good);}
  .badge.soon{background:var(--warn-soft); color:var(--warn);}
  .stat-line{font-size:12px; color:var(--accent); margin-top:2px;}

  footer{text-align:center; font-size:12px; color:var(--sub); margin-top:40px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>CAT 2026 Prep — Topic Sprints</h1>
    <p>30-min diagnostic sprints, real PYQs (2021&ndash;2025), one topic at a time. Pick a topic to start.</p>
  </header>

  <div class="section-title">Quantitative Ability</div>
  <div class="grid" id="qaGrid"></div>

  <div class="section-title">Data Interpretation &amp; Logical Reasoning</div>
  <div class="grid" id="dilrGrid"></div>

  <div class="section-title">Verbal Ability &amp; Reading Comprehension</div>
  <div class="grid" id="varcGrid"></div>

  <footer>Digital persona stored locally in this browser, per topic.</footer>
</div>

<script>
const TOPICS = {
  qa: [
    { key:"ratio_proportion", name:"Ratio &amp; Proportion", desc:"Ratio-change, mixtures, income splits, pipes", href:"sprints/ratio_proportion_sprint.html", live:true },
    { key:"percentages", name:"Percentages &amp; Profit-Loss", desc:"SI-CI, discounts, profit chains", href:"sprints/percentages_sprint.html", live:false },
    { key:"tsd", name:"Time, Speed &amp; Distance", desc:"Relative speed, races, boats-streams", href:"sprints/tsd_sprint.html", live:false },
    { key:"number_system", name:"Number System", desc:"Remainders, factors, base systems", href:"sprints/number_system_sprint.html", live:false },
    { key:"algebra", name:"Algebra", desc:"Quadratics, functions, inequalities", href:"sprints/algebra_sprint.html", live:false },
    { key:"geometry", name:"Geometry &amp; Mensuration", desc:"Circles, triangles, coordinate geometry", href:"sprints/geometry_sprint.html", live:false },
    { key:"modern_math", name:"Modern Math", desc:"P&C, probability, sequences", href:"sprints/modern_math_sprint.html", live:false },
  ],
  dilr: [
    { key:"arrangements", name:"Arrangements", desc:"Linear &amp; circular seating/grouping", href:"sprints/arrangements_sprint.html", live:false },
    { key:"tabulation", name:"Tabulation &amp; Grid Sets", desc:"Data-fill, deduction sets", href:"sprints/tabulation_sprint.html", live:false },
    { key:"network_routes", name:"Networks &amp; Routes", desc:"Graphs, connections, shortest path", href:"sprints/network_routes_sprint.html", live:false },
    { key:"games_tournaments", name:"Games &amp; Tournaments", desc:"Points tables, knockouts, leagues", href:"sprints/games_tournaments_sprint.html", live:false },
  ],
  varc: [
    { key:"rc_inference", name:"RC — Inference &amp; Tone", desc:"Abstract, business, science passages", href:"sprints/rc_inference_sprint.html", live:false },
    { key:"para_jumbles", name:"Para-jumbles &amp; Odd Sentence", desc:"Linking, sequencing technique", href:"sprints/para_jumbles_sprint.html", live:false },
    { key:"summary", name:"Summary &amp; Para-completion", desc:"Scope, tone elimination", href:"sprints/summary_sprint.html", live:false },
  ]
};

function personaFor(key){
  try{ return JSON.parse(localStorage.getItem("catPersona."+key)) || []; }catch(e){ return []; }
}

function renderGrid(id, list){
  const grid = document.getElementById(id);
  list.forEach(t=>{
    const attempts = personaFor(t.key);
    const last = attempts[attempts.length-1];
    const el = document.createElement(t.live ? "a" : "div");
    el.className = "card " + (t.live ? "live" : "disabled");
    if(t.live) el.href = t.href;
    let statLine = "";
    if(t.live && last){
      statLine = `<div class="stat-line">Last: ${last.score}/${last.total} · ${attempts.length} attempt${attempts.length>1?"s":""}</div>`;
    }
    el.innerHTML = `
      <span class="badge ${t.live ? "live":"soon"}">${t.live ? "Live" : "Coming soon"}</span>
      <div class="topic">${t.name}</div>
      <div class="desc">${t.desc}</div>
      ${statLine}
    `;
    grid.appendChild(el);
  });
}

renderGrid("qaGrid", TOPICS.qa);
renderGrid("dilrGrid", TOPICS.dilr);
renderGrid("varcGrid", TOPICS.varc);
</script>
</body>
</html>
