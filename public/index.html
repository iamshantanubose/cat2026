<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT 2026 Prep — Topic Sprints</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --color-primary:#0D9488; --color-primary-dark:#0B7A70; --on-primary:#FFFFFF;
    --color-accent:#EA580C;
    --color-bg:#F6FAF9; --color-card:#FFFFFF;
    --color-fg:#0F172A; --color-sub:#5B6B72; --color-sub-2:#8CA19D;
    --color-border:#E1EBE9; --color-border-strong:#B9DDD8;
    --color-good:#0F7A5C; --color-good-soft:#E4F6EF;
    --color-warn:#B4650A; --color-warn-soft:#FDF1E3;
    --radius-lg:16px; --radius-md:10px; --radius-sm:8px;
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }
  body{
    margin:0; font-family:"Source Sans 3",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--color-bg); color:var(--color-fg); line-height:1.5;
  }
  h1,h2,.brand-word,.topic{font-family:"Lexend",sans-serif;}

  a{color:inherit;}
  .wrap{max-width:960px; margin:0 auto; padding:32px 20px 64px;}

  /* Top bar */
  .topbar{display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:8px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{
    width:34px; height:34px; border-radius:9px; background:var(--color-primary);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .brand .mark svg{width:18px; height:18px;}
  .brand-word{font-weight:700; font-size:16px; letter-spacing:-.01em;}
  .brand-word span{color:var(--color-primary);}

  .user-chip{display:flex; align-items:center; gap:10px; background:var(--color-card); border:1px solid var(--color-border); border-radius:999px; padding:6px 8px 6px 14px;}
  .avatar{
    width:28px; height:28px; border-radius:50%; background:var(--color-primary); color:#fff;
    font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-family:"Lexend",sans-serif;
  }
  .user-chip .uname{font-size:13.5px; font-weight:600;}
  .signout-btn{
    display:flex; align-items:center; gap:5px; text-decoration:none; font-size:12.5px; font-weight:600;
    color:var(--color-sub); background:var(--color-bg); border:1px solid var(--color-border);
    padding:6px 10px; border-radius:999px; transition:background-color 150ms ease, color 150ms ease;
  }
  .signout-btn:hover{background:var(--color-border); color:var(--color-fg);}
  .signout-btn:focus-visible{outline:2px solid var(--color-primary); outline-offset:2px;}
  .signout-btn svg{width:14px; height:14px;}

  .intro{margin:22px 0 30px;}
  .intro h1{font-size:23px; font-weight:600; margin:0 0 6px; letter-spacing:-.01em;}
  .intro p{color:var(--color-sub); font-size:14.5px; margin:0; max-width:60ch;}

  .section{margin-top:30px;}
  .section-head{display:flex; align-items:center; gap:9px; margin-bottom:14px;}
  .section-head .icon{
    width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    background:var(--color-good-soft); color:var(--color-good);
  }
  .section-head .icon svg{width:15px; height:15px;}
  .section-title{font-size:12.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--color-sub);}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px;}

  .card{
    position:relative; background:var(--color-card); border:1px solid var(--color-border); border-radius:var(--radius-lg);
    padding:18px 18px 18px 20px; display:flex; flex-direction:column; gap:9px; text-decoration:none; color:inherit;
    transition:border-color 150ms ease, box-shadow 150ms ease, transform 100ms ease;
    overflow:hidden;
  }
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:transparent; transition:background-color 150ms ease;}
  .card.live::before{background:var(--color-primary);}
  .card.live{cursor:pointer;}
  .card.live:hover{border-color:var(--color-border-strong); box-shadow:0 6px 20px -10px rgba(13,148,136,.35); transform:translateY(-2px);}
  .card.live:focus-visible{outline:2px solid var(--color-primary); outline-offset:2px;}
  .card.disabled{opacity:.68; cursor:default;}
  .card.disabled::before{background:var(--color-border);}

  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:4px 9px 4px 7px; border-radius:20px;}
  .badge svg{width:11px; height:11px;}
  .badge.live{background:var(--color-good-soft); color:var(--color-good);}
  .badge.soon{background:var(--color-warn-soft); color:var(--color-warn);}

  .card .topic{font-size:15.5px; font-weight:600; line-height:1.3;}
  .card .desc{font-size:12.5px; color:var(--color-sub); line-height:1.45;}

  .stat-line{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--color-primary-dark);
    background:rgba(13,148,136,.08); padding:4px 9px; border-radius:999px; margin-top:2px; align-self:flex-start;
  }
  .stat-line svg{width:12px; height:12px;}

  .go-arrow{
    position:absolute; right:16px; bottom:16px; width:26px; height:26px; border-radius:50%;
    background:var(--color-bg); display:flex; align-items:center; justify-content:center;
    color:var(--color-primary); opacity:0; transform:translateX(-4px);
    transition:opacity 150ms ease, transform 150ms ease;
  }
  .card.live:hover .go-arrow{opacity:1; transform:translateX(0);}
  .go-arrow svg{width:14px; height:14px;}

  footer{text-align:center; font-size:12.5px; color:var(--color-sub-2); margin-top:48px; display:flex; align-items:center; justify-content:center; gap:6px;}
  footer svg{width:13px; height:13px;}

  .hero{
    background:linear-gradient(135deg, var(--color-primary) 0%, #059669 100%);
    border-radius:var(--radius-lg); padding:40px 28px; margin-bottom:32px;
    color:#fff; text-align:center; box-shadow:0 8px 24px -6px rgba(13,148,136,.25);
  }
  .hero-quote{font-size:18px; font-weight:600; line-height:1.5; margin:0 0 12px; letter-spacing:-.01em;}
  .hero-meta{font-size:13px; opacity:.85;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </span>
      <div class="brand-word">CAT 2026 <span>Prep</span></div>
    </div>
    <div class="user-chip">
      <span class="avatar" id="avatarInitial">&hellip;</span>
      <span class="uname" id="whoName">&hellip;</span>
      <a class="signout-btn" href="/login.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </a>
    </div>
  </div>

  <div class="hero">
    <div class="hero-quote" id="heroQuote">Loading motivation...</div>
    <div class="hero-meta" id="heroMeta"></div>
  </div>

  <div class="intro">
    <h1>Topic Sprints</h1>
    <p>30-minute diagnostic sprints, real PYQs, one topic at a time. Pick a topic to start.</p>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="10" y2="11"/><line x1="13" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="10" y2="15"/><line x1="13" y1="15" x2="16" y2="15"/></svg></span>
      <span class="section-title">Quantitative Ability</span>
    </div>
    <div class="grid" id="qaGrid"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
      <span class="section-title">Data Interpretation &amp; Logical Reasoning</span>
    </div>
    <div class="grid" id="dilrGrid"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
      <span class="section-title">Verbal Ability &amp; Reading Comprehension</span>
    </div>
    <div class="grid" id="varcGrid"></div>
  </div>

  <footer>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Persona stored server-side, keyed to your login.
  </footer>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const USER = params.get("u");
const TOKEN = params.get("t");

if(!USER || !TOKEN){
  window.location.href = "/login.html";
}
document.getElementById("whoName").textContent = USER;
document.getElementById("avatarInitial").textContent = (USER || "?").charAt(0).toUpperCase();

const TOPICS = {
  qa: [
    { key:"ratio_proportion", name:"Ratio &amp; Proportion", desc:"Ratio-change, mixtures, income splits, pipes", href:"sprints/ratio_proportion_sprint.html", live:true },
    { key:"percentages", name:"Percentages &amp; Profit-Loss", desc:"SI-CI, discounts, profit chains", href:"sprints/percentages_sprint.html", live:false },
    { key:"tsd", name:"Time, Speed &amp; Distance", desc:"Relative speed, races, boats-streams", href:"sprints/tsd_sprint.html", live:false },
    { key:"number_system", name:"Number System", desc:"Remainders, factors, base systems", href:"sprints/number_system_sprint.html", live:false },
    { key:"algebra", name:"Algebra", desc:"Quadratics, functions, inequalities", href:"sprints/algebra_sprint.html", live:false },
    { key:"geometry", name:"Geometry &amp; Mensuration", desc:"Circles, triangles, coordinate geometry", href:"sprints/geometry_sprint.html", live:false },
    { key:"modern_math", name:"Modern Math", desc:"P&C, probability, sequences", href:"sprints/modern_math_sprint.html", live:false },
  ],
  dilr: [
    { key:"arrangements", name:"Arrangements", desc:"Linear &amp; circular seating/grouping", href:"sprints/arrangements_sprint.html", live:false },
    { key:"tabulation", name:"Tabulation &amp; Grid Sets", desc:"Data-fill, deduction sets", href:"sprints/tabulation_sprint.html", live:false },
    { key:"network_routes", name:"Networks &amp; Routes", desc:"Graphs, connections, shortest path", href:"sprints/network_routes_sprint.html", live:false },
    { key:"games_tournaments", name:"Games &amp; Tournaments", desc:"Points tables, knockouts, leagues", href:"sprints/games_tournaments_sprint.html", live:false },
  ],
  varc: [
    { key:"rc_inference", name:"RC — Inference &amp; Tone", desc:"Abstract, business, science passages", href:"sprints/rc_inference_sprint.html", live:false },
    { key:"para_jumbles", name:"Para-jumbles &amp; Odd Sentence", desc:"Linking, sequencing technique", href:"sprints/para_jumbles_sprint.html", live:false },
    { key:"summary", name:"Summary &amp; Para-completion", desc:"Scope, tone elimination", href:"sprints/summary_sprint.html", live:false },
  ]
};

function withAuth(href){
  const u = new URL(href, window.location.href);
  u.searchParams.set("u", USER);
  u.searchParams.set("t", TOKEN);
  return u.pathname + u.search;
}

const LIVE_BADGE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Live`;
const SOON_BADGE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Coming soon`;
const STAT_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const ARROW_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

function renderGrid(id, list, persona){
  const grid = document.getElementById(id);
  list.forEach(t=>{
    const attempts = persona[t.key] || [];
    const last = attempts[attempts.length-1];
    const el = document.createElement(t.live ? "a" : "div");
    el.className = "card " + (t.live ? "live" : "disabled");
    if(t.live) el.href = withAuth(t.href);
    let statLine = "";
    if(t.live && last){
      statLine = `<div class="stat-line">${STAT_ICON}Last: ${last.score}/${last.total} · ${attempts.length} attempt${attempts.length>1?"s":""}</div>`;
    }
    el.innerHTML = `
      <div class="card-top">
        <span class="badge ${t.live ? "live":"soon"}">${t.live ? LIVE_BADGE : SOON_BADGE}</span>
      </div>
      <div class="topic">${t.name}</div>
      <div class="desc">${t.desc}</div>
      ${statLine}
      ${t.live ? `<span class="go-arrow" aria-hidden="true">${ARROW_ICON}</span>` : ""}
    `;
    grid.appendChild(el);
  });
}

const DAILY_QUOTES = [
  "Every problem is an opportunity to learn. Embrace it.",
  "Success is not final, failure is not fatal. Keep going.",
  "The only way to do great work is to love what you do.",
  "Believe in yourself. You are closer than you think.",
  "Progress over perfection. Small steps win races.",
  "Your future self is watching you right now. Make them proud.",
  "Hard work beats talent when talent is lazy.",
  "Mistakes are proof you're trying. Learn and move on.",
  "Focus on what you can control. Let go of the rest.",
  "Every day is a fresh start. Make it count."
];

function getDailyQuote(){
  const today = new Date();
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(),0,0)) / 86400000);
  const quote = DAILY_QUOTES[dayOfYear % DAILY_QUOTES.length];
  const month = today.toLocaleString('default', {month:'short'});
  const date = today.getDate();
  return {quote, date: `${month} ${date}, ${today.getFullYear()}`};
}

function renderHero(){
  const {quote, date} = getDailyQuote();
  document.getElementById("heroQuote").textContent = quote;
  document.getElementById("heroMeta").textContent = `Today's motivation • ${date}`;
}

async function init(){
  renderHero();
  let persona = {};
  try{
    const res = await fetch(`/api/persona-get?token=${encodeURIComponent(TOKEN)}`);
    if(res.ok) persona = await res.json();
    else if(res.status === 401) { window.location.href = "/login.html"; return; }
  }catch(e){ /* backend unreachable — render with no history rather than block */ }

  renderGrid("qaGrid", TOPICS.qa, persona);
  renderGrid("dilrGrid", TOPICS.dilr, persona);
  renderGrid("varcGrid", TOPICS.varc, persona);
}
init();
</script>
</body>
</html>
